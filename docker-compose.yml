services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        CACHEBUST: ${CACHEBUST:-1}
        BUILDKIT_INLINE_CACHE: "1"
    image: openvoorsocials:latest
    restart: unless-stopped
    command: >
      sh -c "echo 'Waiting for DB...' &&
             until python -c \"import psycopg2, os; psycopg2.connect(os.environ['DATABASE_URL']); print('DB ready')\" 2>/dev/null; do sleep 2; done &&
             python manage.py migrate --noinput &&
             python manage.py createsuperuser --noinput 2>/dev/null || true &&
             python manage.py generate_missing_images &
             (while true; do python manage.py publish_due_posts; sleep 300; done) &
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120"
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    volumes:
      - media_data:/app/media
    ports:
      - "5005:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  media_data:
