name: Deploy to Coolify

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deploy
        run: |
          curl -s -X POST https://coolify.openvoor.app/api/v1/deploy \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"uuid":"oxjluowiyhh02um1056wt1dp","force":false}' \
            | tee /dev/stderr \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('Queued:', d['deployments'][0]['deployment_uuid'])"
