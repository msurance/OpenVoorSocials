name: Deploy to Coolify

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deploy
        run: |
          curl -sf -X POST \
            "https://coolify.openvoor.app/api/v1/deploy?token=${{ secrets.COOLIFY_WEBHOOK_SECRET }}&uuid=oxjluowiyhh02um1056wt1dp" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json"
